services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: moyuan-postgres
    environment:
      POSTGRES_USER: moyuan
      POSTGRES_PASSWORD: moyuan
      POSTGRES_DB: moyuan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moyuan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moyuan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - with-redis

volumes:
  postgres_data:
  redis_data:
